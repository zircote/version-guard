<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Geometric pattern: shield/guard motif -->
  <!-- Large shield shape (central metaphor) -->
  <path d="M640 80 L780 160 L780 360 L640 480 L500 360 L500 160 Z" fill="url(#accent1)" opacity="0.12"/>
  <path d="M640 80 L780 160 L780 360 L640 480 L500 360 L500 160 Z" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>

  <!-- Inner shield -->
  <path d="M640 140 L740 200 L740 340 L640 420 L540 340 L540 200 Z" fill="url(#accent1)" opacity="0.08"/>

  <!-- Version dots pattern (representing ecosystems) -->
  <!-- Row 1 -->
  <circle cx="160" cy="120" r="24" fill="url(#accent2)" opacity="0.6"/>
  <circle cx="220" cy="100" r="16" fill="url(#accent1)" opacity="0.4"/>
  <circle cx="120" cy="170" r="12" fill="url(#accent3)" opacity="0.5"/>

  <!-- Row 2 -->
  <circle cx="1080" cy="140" r="20" fill="url(#accent1)" opacity="0.5"/>
  <circle cx="1140" cy="110" r="14" fill="url(#accent2)" opacity="0.4"/>
  <circle cx="1030" cy="100" r="18" fill="url(#accent3)" opacity="0.3"/>

  <!-- Connecting lines (dependency graph metaphor) -->
  <line x1="160" y1="120" x2="220" y2="100" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="120" x2="120" y2="170" stroke="#10b981" stroke-width="1.5" opacity="0.2"/>
  <line x1="1080" y1="140" x2="1140" y2="110" stroke="#3b82f6" stroke-width="1.5" opacity="0.2"/>
  <line x1="1080" y1="140" x2="1030" y2="100" stroke="#f59e0b" stroke-width="1.5" opacity="0.2"/>

  <!-- Scattered geometric shapes (ecosystem diversity) -->
  <rect x="80" y="380" width="40" height="40" rx="6" fill="url(#accent1)" opacity="0.15" transform="rotate(15, 100, 400)"/>
  <rect x="200" y="450" width="30" height="30" rx="4" fill="url(#accent2)" opacity="0.12" transform="rotate(-10, 215, 465)"/>
  <polygon points="1150,400 1170,440 1130,440" fill="url(#accent3)" opacity="0.2"/>
  <rect x="1060" y="460" width="35" height="35" rx="5" fill="url(#accent1)" opacity="0.1" transform="rotate(20, 1077, 477)"/>
  <circle cx="1180" cy="500" r="15" fill="url(#accent2)" opacity="0.15"/>

  <!-- Checkmark inside shield (verified) -->
  <path d="M610 270 L635 300 L680 240" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Up arrow (latest version) -->
  <path d="M640 200 L640 180" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M630 190 L640 175 L650 190" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Bottom decorative bar -->
  <rect x="0" y="620" width="1280" height="20" fill="url(#accent1)" opacity="0.08"/>

  <!-- Project name -->
  <text x="640" y="550" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#1e293b" letter-spacing="-1">version-guard</text>

  <!-- Tagline -->
  <text x="640" y="590" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#64748b" letter-spacing="0.5">Verify library versions against live documentation</text>
</svg>
