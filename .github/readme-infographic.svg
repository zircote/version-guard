<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#1e293b">How version-guard works</text>

  <!-- Flow: 6 steps connected by arrows -->

  <!-- Step 1: Detect -->
  <rect x="20" y="70" width="110" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="100" text-anchor="middle" font-family="monospace" font-size="20" fill="#3b82f6">1</text>
  <text x="75" y="120" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Detect</text>
  <text x="75" y="136" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">Version context</text>

  <!-- Arrow 1-2 -->
  <path d="M135 110 L160 110" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#94a3b8"/></marker></defs>

  <!-- Step 2: Load -->
  <rect x="165" y="70" width="110" height="80" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="220" y="100" text-anchor="middle" font-family="monospace" font-size="20" fill="#10b981">2</text>
  <text x="220" y="120" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#047857">Load Tools</text>
  <text x="220" y="136" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">Context7 MCP</text>

  <!-- Arrow 2-3 -->
  <path d="M280 110 L305 110" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Resolve -->
  <rect x="310" y="70" width="110" height="80" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="365" y="100" text-anchor="middle" font-family="monospace" font-size="20" fill="#f59e0b">3</text>
  <text x="365" y="120" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#b45309">Resolve</text>
  <text x="365" y="136" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">Find library ID</text>

  <!-- Arrow 3-4 -->
  <path d="M425 110 L450 110" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Query -->
  <rect x="455" y="70" width="110" height="80" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="510" y="100" text-anchor="middle" font-family="monospace" font-size="20" fill="#8b5cf6">4</text>
  <text x="510" y="120" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Query Docs</text>
  <text x="510" y="136" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">Live version info</text>

  <!-- Arrow 4-5 -->
  <path d="M570 110 L595 110" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Apply -->
  <rect x="600" y="70" width="110" height="80" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="655" y="100" text-anchor="middle" font-family="monospace" font-size="20" fill="#059669">5</text>
  <text x="655" y="120" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#047857">Apply</text>
  <text x="655" y="136" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#64748b">Verified version</text>

  <!-- Ecosystem grid -->
  <text x="400" y="195" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#475569">13+ Supported Ecosystems</text>

  <!-- Ecosystem pills -->
  <rect x="40" y="215" width="70" height="26" rx="13" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="75" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#2563eb">npm</text>

  <rect x="120" y="215" width="70" height="26" rx="13" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="155" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#16a34a">PyPI</text>

  <rect x="200" y="215" width="70" height="26" rx="13" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="235" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#b45309">Cargo</text>

  <rect x="280" y="215" width="70" height="26" rx="13" fill="#e0f2fe" stroke="#bae6fd" stroke-width="1"/>
  <text x="315" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#0369a1">Go</text>

  <rect x="360" y="215" width="70" height="26" rx="13" fill="#fce7f3" stroke="#fbcfe8" stroke-width="1"/>
  <text x="395" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#be185d">Ruby</text>

  <rect x="440" y="215" width="70" height="26" rx="13" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="475" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#7c3aed">Maven</text>

  <rect x="520" y="215" width="70" height="26" rx="13" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="555" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#c2410c">Gradle</text>

  <rect x="600" y="215" width="70" height="26" rx="13" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="635" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#0284c7">.NET</text>

  <rect x="680" y="215" width="80" height="26" rx="13" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="720" y="232" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#059669">Composer</text>

  <!-- Row 2 -->
  <rect x="200" y="250" width="70" height="26" rx="13" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="235" y="267" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#be123c">Swift</text>

  <rect x="280" y="250" width="70" height="26" rx="13" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="315" y="267" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#7c3aed">Elixir</text>

  <rect x="360" y="250" width="70" height="26" rx="13" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="395" y="267" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#16a34a">uv</text>

  <rect x="440" y="250" width="70" height="26" rx="13" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="475" y="267" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#2563eb">Poetry</text>

  <!-- Key features row -->
  <line x1="40" y1="300" x2="760" y2="300" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Feature 1 -->
  <circle cx="130" cy="340" r="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="345" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#3b82f6">&#x1F50D;</text>
  <text x="130" y="375" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">Live Verification</text>

  <!-- Feature 2 -->
  <circle cx="310" cy="340" r="20" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="310" y="345" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#10b981">&#x26A1;</text>
  <text x="310" y="375" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">Proactive Detection</text>

  <!-- Feature 3 -->
  <circle cx="490" cy="340" r="20" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="345" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#f59e0b">&#x1F6E1;</text>
  <text x="490" y="375" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">Security First</text>

  <!-- Feature 4 -->
  <circle cx="670" cy="340" r="20" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="670" y="345" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="16" fill="#8b5cf6">&#x1F504;</text>
  <text x="670" y="375" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">Auto Fallback</text>
</svg>
